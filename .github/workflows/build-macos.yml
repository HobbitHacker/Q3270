name: macOS Multi-Arch Build

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-26-intel
            arch: x86_64
            name: Intel-x86
          - os: macos-26
            arch: arm64
            name: Apple-Silicon
    runs-on: ${{ matrix.os }}
    name: Build for ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt6
        run: |
          brew install qt
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt)" >> $GITHUB_ENV

      - name: Configure and Build
        run: |
          rm -rf build
          mkdir build && cd build
          export CFLAGS="-arch ${{ matrix.arch }}"
          export CXXFLAGS="-arch ${{ matrix.arch }}"
          export LDFLAGS="-arch ${{ matrix.arch }}"
          cmake -G "Unix Makefiles" .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}" \
            -DCMAKE_OSX_SYSROOT=$(xcrun --sdk macos --show-sdk-path) \
            -DCMAKE_PREFIX_PATH="${{ env.Qt5_DIR }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
            -DCMAKE_APPLE_SILICON_PROCESSOR=x86_64
          make -j$(sysctl -n hw.ncpu) VERBOSE=1

      - name: Package DMG
        run: |
          macdeployqt build/src/Q3270.app -dmg
          mv build/src/Q3270.dmg Q3270-${{ matrix.name }}.dmg

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "Q3270-${{ matrix.name }}.dmg"

      - name: Upload as workflow artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Q3270-macOS-${{ matrix.name }}
          path: "Q3270-${{ matrix.name }}.dmg"
