name: Release

on:
  push:
    branches: [ci-dev]
    tags:
      - 'v*'

jobs:
  generate-release-notes:
    runs-on: ubuntu-latest
    outputs:
      release_notes: ${{ steps.cliff.outputs.content }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          VERSION=$(curl -sI https://github.com/orhun/git-cliff/releases/latest | grep -i location | grep -oP 'v[\d.]+')
          curl -sL "https://github.com/orhun/git-cliff/releases/download/${VERSION}/git-cliff-${VERSION#v}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --strip-components=1
          sudo mv git-cliff /usr/local/bin/

      - name: Generate release notes with git-cliff
        id: cliff
        run: |
          NOTES=$(git-cliff --latest --strip header)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build-debian:
    uses: ./.github/workflows/build-debian.yml
    secrets: inherit

  build-macos:
    uses: ./.github/workflows/build-macos.yml
    secrets: inherit

  update-homebrew:
    needs: [build-macos, create-release]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Get release version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Download tarball and calculate SHA256
        id: sha
        run: |
          URL="https://github.com/HobbitHacker/Q3270/archive/refs/tags/${{ steps.version.outputs.VERSION }}.tar.gz"
          curl -sL "$URL" -o tarball.tar.gz
          SHA=$(sha256sum tarball.tar.gz | awk '{print $1}')
          echo "SHA256=$SHA" >> $GITHUB_OUTPUT
          echo "URL=$URL" >> $GITHUB_OUTPUT

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: HobbitHacker/homebrew-q3270
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          sed -i 's|url ".*"|url "${{ steps.sha.outputs.URL }}"|' q3270.rb
          sed -i 's|sha256 ".*"|sha256 "${{ steps.sha.outputs.SHA256 }}"|' q3270.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add q3270.rb
          git commit -m "Update Q3270 to ${{ steps.version.outputs.VERSION }}"
          git push

  create-release:
    needs: [generate-release-notes, build-debian, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ needs.generate-release-notes.outputs.release_notes }}
          draft: false
          prerelease: false

  generate-sbom:
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          output-file: q3270-${{ github.ref_name }}.spdx.json
          format: spdx-json

      - name: Attach SBOM to release
        uses: softprops/action-gh-release@v1
        with:
          files: q3270-${{ github.ref_name }}.spdx.json
