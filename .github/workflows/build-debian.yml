name: Debian package build for Q3270

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            devscripts \
            debhelper \
            fakeroot \
            qtbase5-dev \
            qttools5-dev \
            qttools5-dev-tools \
            libqt5svg5-dev

      - name: Generate debian/changelog
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="0.0.0-dev"
          else
            VERSION=${GITHUB_REF_NAME#v}
          fi
          DATE=$(date -R)
          printf "q3270 (%s-1) jammy; urgency=medium\n\n  * New upstream release %s\n\n -- Andy Styles <linuxajs@gmail.com>  %s\n" \
            "${VERSION}" "${VERSION}" "${DATE}" > debian/changelog

      - name: Build package
        run: |
          dpkg-buildpackage -us -uc -b -d
          mv ../*.deb .

      - name: Upload to GitHub Release
        if: github.event_name == 'workflow_call'
        uses: softprops/action-gh-release@v1
        with:
          files: "*.deb"

      - name: Upload as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: debian-packages
          path: "*.deb"
