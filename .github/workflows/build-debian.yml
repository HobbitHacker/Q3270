name: Debian package build for Q3270

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            devscripts \
            debhelper \
            fakeroot \
            qt6-base-dev \
            libqt6svg6-dev \
            libgl-dev

      - name: Generate debian/changelog
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             [ "${{ github.ref_type }}" = "branch" ]; then
            VERSION="0.0.0-dev"
          else
            VERSION=${GITHUB_REF_NAME#v}
          fi
          DATE=$(date -R)
          printf "q3270 (%s-1) jammy; urgency=medium\n\n  * New upstream release %s\n\n -- Andy Styles <linuxajs@gmail.com>  %s\n" \
            "${VERSION}" "${VERSION}" "${DATE}" > debian/changelog

      - name: Build package
        run: |
          dpkg-buildpackage -us -uc -b -d
          mv ../*.deb .

      - name: Upload to GitHub Release
        if: ${{ github.workflow == 'Release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"

      - name: Upload as workflow artifact
        if: ${{ github.workflow == 'Release' }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: debian-packages
          path: "*.deb"
